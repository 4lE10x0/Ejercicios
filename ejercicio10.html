<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Celsius a Fahrenheit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="container text-center p-5 bg-white rounded shadow">
        <h1 class="mb-3">Convertidor de Temperaturas</h1>
        <h5 class="text-muted mb-4">Convierte de Celsius a Fahrenheit</h5>
        <form id="formulario" class="text-start">
            <div class="mb-3">
                <label for="celsius">Temperatura en Celsius:</label>
                <input type="number" id="celsius" placeholder="Ingrese la temperatura en Celsius" required pattern="[0-9]+(\.[0-9]+)?" class="form-control">
            </div>
            <div class="d-grid">
                <button type="button" onclick="convertirTemperatura()" class="btn btn-primary">Convertir</button>
            </div>
        </form>

        <div class="mt-4">
            <label for="resultado" class="form-label">Temperatura en Fahrenheit:</label>
            <textarea name="resultado" id="fahrenheit" readonly disabled class="form-control text-sucess fw-bold fs-5" style="resize:none; height:60px; text-align:center;"></textarea>
        </div>
    </div>
</body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/ejercicio10.js"></script>
</html>
