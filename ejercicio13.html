<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Validador de Edad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="container text-center p-5 bg-white rounded shadow">
        <h1 class="mb-3 text-primary">¿Puedes Votar?</h1>
        <h5 class="text-muted mb-4 text-info">Averigualo</h5>
        <form id="formulario" class="text-start">
            <div class="mb-3">
                <label for="edad">Ingresa tu Edad:</label>
                <input type="number" id="edad" placeholder="Ej: 48" required pattern="^[1-9][0-9]*$" class="form-control" min="5" max="150">
            </div>
            <div class="d-grid">
                <button type="button" onclick="validarEdad()" class="btn btn-outline-info fw-bold">Verificar</button>
            </div>
        </form>

        <div class="mt-4">
            <label for="resultado" class="form-label">Validacion:</label>
            <textarea name="resultado" id="validacion" readonly disabled class="form-control fw-bold fs-5 text-primary" style="resize:none; height:60px; text-align:center;"></textarea>
        </div>
    </div>
</body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/ejercicio13.js"></script>
</html>
