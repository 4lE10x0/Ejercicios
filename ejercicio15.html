<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15 - Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column justify-content-btween align-items-center vh-100">
    <div class="container text-center p-5 bg-white rounded shadow">
        <h1 class="mb-3 text-primary">Sistema de Estudiantes</h1>
        <form id="formulario" class="text-start">
            <div class="mb-3">
                <label for="edad">Nombre del Estudiante:</label>
                <input type="text" id="nombre" placeholder="Ej: Pedro" required class="form-control">
            </div>

            <div class="mb-3">
                <label for="edad">Calificacion del Estudiante:</label>
                <input type="number" id="calif" placeholder="Ej: 89" required pattern="^[1-9][0-9]"
                    class="form-control" min="0" max="100">
            </div>

            <div class="container mt-4">
                <div class="row">
                    <div class="col">
                        <button type="button" class="btn btn-primary w-100" id="btnAgregar" onclick="agregarEstudiante()">Agregar Estudiante</button>
                    </div>
                    <div class="col">
                        <button type="button" class="btn btn-secondary w-100" id="btnCalcular" onclick="calcular()">Calcular</button>
                    </div>
                    <div class="col">
                        <button type="reset" class="btn btn-danger w-100">Borrar</button>
                    </div>
                </div>
            </div>
        </form>
        <div class="mt-4">
            <label for="resultado" class="form-label fs-3 fw-bold text-primary">Resultados:</label>
            <textarea name="resultado" id="resultados" readonly disabled class="form-control fw-italic fs-5 text-bg-info" style="resize:none; height: 150px; text-align:left;"></textarea>
        </div>
    </div>
    <br>
    <div class="container text-center p-5 bg-white rounded shadow">
        <h1 class="mb-3 text-primary">Estudiantes Agregados</h1>
        <table class="table table-striped table-hover">
            <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Calificaciones</th>
                </tr>
            </thead>
            <tbody id="lista_estudiantes">

            </tbody>
        </table>
    </div>
</body>
<script src="js/ejercicio15.js"></script>
</html>
