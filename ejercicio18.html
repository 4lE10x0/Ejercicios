<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manipulación del DOM con Bootstrap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Agregar y Eliminar Elementos</h1>

        <!-- Fila para input y botón -->
        <div class="row g-3 mb-4">
            <div class="col-md-8">
                <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo..." />
            </div>
            <div class="col-md-4">
                <button id="agregarBtn" class="btn btn-primary w-100">Agregar</button>
            </div>
        </div>

        <!-- Lista de elementos -->
        <ul id="lista" class="list-group">
            <!-- Los elementos se agregarán dinámicamente aquí -->
        </ul>
    </div>

    <script src="js/ejercicio18.js"></script>
</body>
</html>
